name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -json ./... > test-results.json

      - name: Test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Go Tests
          path: test-results.json
          reporter: golang-json